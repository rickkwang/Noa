name: desktop-beta

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  mac-arm64-beta:
    runs-on: macos-14
    env:
      GH_TOKEN: ${{ github.token }}
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build:budget
      - run: npx playwright install --with-deps chromium
      - run: npm run test:smoke

      - name: Build mac arm64
        run: BUILD_TARGET=desktop npm run build && npx electron-builder --mac dmg zip --arm64 --publish never

      - name: Generate latest-mac.yml
        run: |
          SHA512=$(shasum -a 512 release/Noa-*.dmg | awk '{print $1}' | xxd -r -p | base64)
          SIZE=$(stat -f%z release/Noa-*.dmg)
          VERSION=$(node -p "require('./package.json').version")
          DMG_NAME="Noa-${VERSION}-arm64.dmg"
          cat > release/latest-mac.yml << EOF
          version: ${VERSION}
          files:
            - url: ${DMG_NAME}
              sha512: ${SHA512}
              size: ${SIZE}
          path: ${DMG_NAME}
          sha512: ${SHA512}
          releaseDate: '$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'
          EOF

      - name: Upload to GitHub Release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release upload "v${VERSION}" \
            release/Noa-${VERSION}-arm64.dmg \
            release/Noa-${VERSION}-arm64-mac.zip \
            release/latest-mac.yml \
            --clobber
