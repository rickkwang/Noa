name: desktop-release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  mac-arm64-release:
    runs-on: macos-14
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run check:structure
      - run: npm run test:unit
      - run: npm run build:budget
      - run: npx playwright install --with-deps chromium
      - run: npm run test:smoke

      - name: Verify release version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ "${GITHUB_REF_NAME}" != "v${VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version v${VERSION}." >&2
            exit 1
          fi

      - name: Build mac arm64
        run: BUILD_TARGET=desktop npm run build && npx electron-builder --mac dmg zip --arm64 --publish never

      - name: Verify desktop security artifacts
        run: |
          node scripts/verify-desktop-csp.mjs dist/index.html
          node scripts/verify-mac-update-metadata.mjs release/latest-mac.yml package.json

      - name: Upload to GitHub Release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if ! gh release view "v${VERSION}" --json tagName >/dev/null 2>&1; then
            gh release create "v${VERSION}" \
              --title "Noa v${VERSION}" \
              --notes "Release v${VERSION}" \
              --target "${GITHUB_SHA}"
          fi
          gh release upload "v${VERSION}" \
            release/Noa-${VERSION}-arm64.dmg \
            release/Noa-${VERSION}-arm64-mac.zip \
            release/latest-mac.yml \
            --clobber
